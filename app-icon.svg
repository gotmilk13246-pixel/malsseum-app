<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2800"/>
      <stop offset="50%" style="stop-color:#7a4a10"/>
      <stop offset="100%" style="stop-color:#3a1f00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c87a"/>
      <stop offset="100%" style="stop-color:#c9a96e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- 배경 패턴 -->
  <rect width="512" height="512" rx="80" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(232,200,122,0.08)" stroke-width="1"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="rgba(232,200,122,0.06)" stroke-width="1"/>

  <!-- 십자가 -->
  <rect x="236" y="120" width="40" height="200" rx="8" fill="url(#gold)" filter="url(#glow)"/>
  <rect x="156" y="190" width="200" height="40" rx="8" fill="url(#gold)" filter="url(#glow)"/>

  <!-- 광채 효과 -->
  <ellipse cx="256" cy="200" rx="30" ry="30" fill="rgba(232,200,122,0.15)"/>

  <!-- 하단 텍스트: 말씀이 답이다 -->
  <text x="256" y="380" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="36" font-weight="700" fill="#e8c87a" text-anchor="middle" letter-spacing="2">말씀이 답이다</text>

  <!-- 하단 교회명 -->
  <text x="256" y="420" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-size="22" font-weight="400" fill="rgba(232,200,122,0.6)" text-anchor="middle" letter-spacing="1">청양침례교회</text>

  <!-- 하단 장식선 -->
  <line x1="156" y1="440" x2="356" y2="440" stroke="rgba(232,200,122,0.3)" stroke-width="1"/>
</svg>
